<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brand 4 Executive Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="sidebar">
        <h2>Brand Analytics</h2>
        <ul>
            <li><a href="#">Executive Summary</a></li>
            <li><a href="#">Price Perception</a></li>
            <li><a href="#">Channel Reach</a></li>
        </ul>
    </nav>
    <main class="content">
        <h1>Price Perception Sentiment</h1>
        <div class="chart-box">
            <canvas id="priceChart"></canvas>
        </div>
    </main>

    <script>
        const ctx = document.getElementById('priceChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Brand 1', 'Brand 2', 'Brand 3', 'Brand 4', 'Brand 5'],
                datasets: [{
                    label: 'Bargain',
                    data: [20, 30, 15, 40, 10],
                    backgroundColor: '#C5A059' // Muted Gold
                }, {
                    label: 'Expensive',
                    data: [10, 20, 40, 10, 30],
                    backgroundColor: '#1B263B' // Rich Navy
                }]
            },
            options: { responsive: true, scales: { x: { stacked: true }, y: { stacked: true } } }
        });
    </script>
</body>
</html>
